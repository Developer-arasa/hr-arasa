<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Migrasi Sistem - HR Arasa</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;800&display=swap');

    body {
      margin: 0; padding: 0; background: #0f172a; color: white;
      font-family: 'Poppins', sans-serif; display: flex; flex-direction: column;
      align-items: center; justify-content: center; min-height: 100vh;
      overflow: hidden; user-select: none; /* Biar teks gak ke-block pas nahan klik */
    }

    /* EFEK GETAR PAS KUCING NGAMUK */
    body.shake { animation: screenShake 0.1s infinite; background: #1e1b4b; }

    @keyframes screenShake {
      0% { transform: translate(2px, 1px) rotate(0deg); }
      10% { transform: translate(-1px, -2px) rotate(-1deg); }
      20% { transform: translate(-3px, 0px) rotate(1deg); }
      30% { transform: translate(0px, 2px) rotate(0deg); }
      40% { transform: translate(1px, -1px) rotate(1deg); }
      50% { transform: translate(-1px, 2px) rotate(-1deg); }
      60% { transform: translate(-3px, 1px) rotate(0deg); }
      70% { transform: translate(2px, 1px) rotate(-1deg); }
      80% { transform: translate(-1px, -1px) rotate(1deg); }
      90% { transform: translate(2px, 2px) rotate(0deg); }
      100% { transform: translate(1px, -2px) rotate(-1deg); }
    }

    .text-container { text-align: center; z-index: 10; margin-bottom: 50px; pointer-events: none; }
    .text-container h1 { font-size: 32px; font-weight: 800; margin: 0 0 10px 0; color: #f8fafc; letter-spacing: -1px; }
    .text-container p { font-size: 14px; color: #94a3b8; margin: 0; max-width: 400px; line-height: 1.6; }

    /* WADAH KUCING */
    .cat-wrapper {
      position: relative; width: 200px; height: 180px; z-index: 5;
    }

    /* TANGAN MUKUL (Disembunyikan awalnya) */
    .paw-arm {
      position: absolute; top: 120px; left: 100px; width: 0px; height: 16px;
      background: #fb923c; transform-origin: left center; z-index: 20;
      border-radius: 8px; opacity: 0; transition: width 0.1s ease-out, opacity 0.1s;
      pointer-events: none;
    }
    .paw-arm::after {
      content: ''; position: absolute; right: -15px; top: -10px; width: 35px; height: 35px;
      background: #f97316; border-radius: 50%; box-shadow: -2px 2px 10px rgba(0,0,0,0.5);
    }
    /* Mode Mukul */
    .cat-wrapper.angry .paw-arm { opacity: 1; }

    /* KEPALA KUCING OYEN */
    .head {
      width: 160px; height: 140px; background: #fb923c;
      border-radius: 45% 45% 45% 45%; position: absolute;
      bottom: 0; left: 20px; z-index: 10;
      box-shadow: inset -10px -15px 20px rgba(0,0,0,0.2);
      transition: 0.2s;
    }

    /* TELINGA */
    .ear {
      width: 0; height: 0; border-left: 30px solid transparent; border-right: 30px solid transparent;
      border-bottom: 50px solid #fb923c; position: absolute; top: -15px; transition: 0.2s;
    }
    .ear.left { left: -5px; transform: rotate(-25deg); }
    .ear.right { right: -5px; transform: rotate(25deg); }
    
    .ear-inner {
      width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent;
      border-bottom: 35px solid #fecaca; position: absolute; top: 10px; left: -15px;
    }

    /* MATA & LIRIKAN PUPIL */
    .eye {
      width: 40px; height: 40px; background: white; border-radius: 50%;
      position: absolute; top: 50px; display: flex; align-items: center; justify-content: center;
      overflow: hidden; transition: 0.2s;
    }
    .eye.left { left: 30px; }
    .eye.right { right: 30px; }
    
    .pupil {
      width: 22px; height: 22px; background: #0f172a; border-radius: 50%;
      transition: transform 0.05s linear; /* Biar ngikutin kursor gak delay */
    }

    /* HIDUNG & MULUT */
    .nose {
      width: 14px; height: 10px; background: #fca5a5; border-radius: 50% 50% 50% 50% / 30% 30% 70% 70%;
      position: absolute; top: 85px; left: 73px;
    }
    .mouth {
      width: 20px; height: 10px; border-bottom: 3px solid #0f172a; border-radius: 50%;
      position: absolute; top: 95px; left: 70px; transition: 0.2s;
    }

    /* =========== MODE NGAMUK (ANGRY) =========== */
    .cat-wrapper.angry .head { background: #ea580c; box-shadow: inset -10px -15px 20px rgba(0,0,0,0.4); }
    .cat-wrapper.angry .ear.left { transform: rotate(-50deg) translateY(15px); border-bottom-color: #ea580c;}
    .cat-wrapper.angry .ear.right { transform: rotate(50deg) translateY(15px); border-bottom-color: #ea580c;}
    .cat-wrapper.angry .eye { 
      height: 15px; top: 62px; background: #fef08a; /* Mata nyipit kuning marah */
      border-radius: 5px; transform: rotate(10deg);
    }
    .cat-wrapper.angry .eye.left { transform: rotate(15deg); }
    .cat-wrapper.angry .eye.right { transform: rotate(-15deg); }
    .cat-wrapper.angry .pupil { width: 10px; height: 10px; background: #b91c1c; }
    .cat-wrapper.angry .mouth { width: 30px; height: 20px; background: #450a0a; border-radius: 50%; top: 100px; left: 65px; border: none;}
  </style>
</head>
<body>

  <div class="text-container">
    <h1>Nyuwun Pangapunten</h1>
    <p>Situs web iki lagi direnovasi. Nyuwun pangapunten amarga ana gangguan. Situs web iki bakal bisa diakses maneh tanggal 14 Mei 2026, jam 13.00.</p>
  </div>

  <div class="cat-wrapper" id="cat">
    <div class="paw-arm" id="paw"></div>

    <div class="head">
      <div class="ear left"><div class="ear-inner"></div></div>
      <div class="ear right"><div class="ear-inner"></div></div>
      <div class="eye left"><div class="pupil" id="pupil-left"></div></div>
      <div class="eye right"><div class="pupil" id="pupil-right"></div></div>
      <div class="nose"></div>
      <div class="mouth"></div>
    </div>
  </div>

<script>
  const eyes = document.querySelectorAll('.eye');
  const pupils = document.querySelectorAll('.pupil');
  const cat = document.getElementById('cat');
  const paw = document.getElementById('paw');
  
  let isAngry = false;
  let mouseX = window.innerWidth / 2;
  let mouseY = window.innerHeight / 2;

  // 1. SISTEM RADAR: Lirikan Mata Mengikuti Kursor
  function updateEyePosition() {
    if(isAngry) return; // Kalau lagi marah, mata fokus melotot, gak ngelirik

    eyes.forEach((eye, index) => {
      const rect = eye.getBoundingClientRect();
      const eyeCenterX = rect.left + rect.width / 2;
      const eyeCenterY = rect.top + rect.height / 2;

      // Hitung sudut dari tengah mata ke kursor
      const angle = Math.atan2(mouseY - eyeCenterY, mouseX - eyeCenterX);
      
      // Batasi jarak pupil agar tidak keluar dari area putih mata
      const maxDistance = 8; 
      const distance = Math.min(maxDistance, Math.hypot(mouseX - eyeCenterX, mouseY - eyeCenterY) / 15);

      const pupilX = Math.cos(angle) * distance;
      const pupilY = Math.sin(angle) * distance;

      pupils[index].style.transform = `translate(${pupilX}px, ${pupilY}px)`;
    });
  }

  // Melacak pergerakan Mouse & Sentuhan layar HP
  window.addEventListener('mousemove', (e) => {
    mouseX = e.clientX; mouseY = e.clientY;
    updateEyePosition();
  });
  window.addEventListener('touchmove', (e) => {
    mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
    updateEyePosition();
  });

  // 2. SISTEM NGAMUK: Mukul Kursor Saat Ditahan
  function triggerAttack(x, y) {
    isAngry = true;
    cat.classList.add('angry');
    document.body.classList.add('shake');

    // Kembalikan posisi pupil ke tengah (karena mata nyipit marah)
    pupils.forEach(p => p.style.transform = `translate(0px, 0px)`);

    // Kalkulasi jarak dan sudut tangan kucing untuk memukul kursor
    const catRect = cat.getBoundingClientRect();
    // Titik pangkal tangan (bahu kucing)
    const startX = catRect.left + 100; 
    const startY = catRect.top + 120;

    const angle = Math.atan2(y - startY, x - startX) * 180 / Math.PI;
    const distance = Math.hypot(x - startX, y - startY);

    // Rentangkan tangan memukul tepat ke koordinat sasaran
    paw.style.width = (distance - 20) + 'px'; // -20px biar ujung cakarnya pas di kursor
    paw.style.transform = `rotate(${angle}deg)`;
  }

  function calmDown() {
    isAngry = false;
    cat.classList.remove('angry');
    document.body.classList.remove('shake');
    // Tarik kembali tangan kucing
    paw.style.width = '0px';
    updateEyePosition();
  }

  // Memicu amukan pas layar ditahan (Klik kiri / Sentuh HP)
  window.addEventListener('mousedown', (e) => triggerAttack(e.clientX, e.clientY));
  window.addEventListener('touchstart', (e) => triggerAttack(e.touches[0].clientX, e.touches[0].clientY));

  // Menenangkan kucing saat dilepas
  window.addEventListener('mouseup', calmDown);
  window.addEventListener('touchend', calmDown);
</script>
</body>
</html>
