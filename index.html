<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arasa Store - Employee Portal</title>
  <style>
    /* CSS DETAIL: Mengacu pada visual Hijau Kupa */
    :root { --primary: #317c56; --bg: #f8f9fa; --text: #2d3436; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
    .mobile-frame { background: white; width: 100%; max-width: 450px; min-height: 100vh; padding: 30px 20px; box-sizing: border-box; }
    
    .brand-area { text-align: center; margin-bottom: 30px; }
    .brand-logo { background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: bold; font-size: 24px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #636e72; text-transform: uppercase; margin-bottom: 8px; }
    select, input, textarea { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; font-size: 15px; box-sizing: border-box; outline: none; background: #fafafa; }
    select:focus, input:focus { border-color: var(--primary); background: white; }
    
    .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:active { transform: scale(0.98); }

    /* History Style */
    .history-card { padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px; position: relative; }
    .status-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; }
    .PENDING { background: #fff3cd; color: #856404; }
    .IZIN_DIBERIKAN { background: #d4edda; color: #155724; }
    .IZIN_TIDAK_DIBERIKAN { background: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

<div class="mobile-frame">
  <div class="brand-area">
    <div class="brand-logo">A</div>
    <h2 style="margin:0">HR Arasa Store</h2>
    <p style="color:#636e72; font-size: 14px;">Form Perizinan Karyawan</p>
  </div>

  <form id="izinForm">
    <div class="form-group">
      <label>ID Karyawan</label>
      <select id="sel_id"><option value="">Pilih ID</option></select>
    </div>

    <div class="form-group">
      <label>Nama Karyawan</label>
      <select id="sel_nama"><option value="">Pilih Nama</option></select>
    </div>

    <div class="date-grid">
      <div class="form-group">
        <label>Mulai</label>
        <input type="date" id="tgl_mulai" required>
      </div>
      <div class="form-group">
        <label>Akhir</label>
        <input type="date" id="tgl_akhir" required>
      </div>
    </div>

    <div class="form-group">
      <label>Alasan Izin</label>
      <textarea id="alasan" rows="3" placeholder="Jelaskan alasan Paduka..." required></textarea>
    </div>

    <button type="submit" id="btnSubmit">Kirim Pengajuan</button>
  </form>

  <div id="historyBox" style="margin-top:40px; display:none;">
    <h3 style="font-size:16px;">Riwayat Perizinan</h3>
    <div id="listHistory"></div>
  </div>
</div>

<script>
  const API_URL = 'URL_GAS_PADUKA';
  let master = [];
  let history = [];

  // 1. Inisialisasi Data
  window.onload = async () => {
    const res = await fetch(API_URL);
    const data = await res.json();
    master = data.master;
    history = data.history;

    const selId = document.getElementById('sel_id');
    const selNama = document.getElementById('sel_nama');

    master.forEach(k => {
      selId.innerHTML += `<option value="${k.ID}">${k.ID}</option>`;
      selNama.innerHTML += `<option value="${k.ID}">${k.NAMA}</option>`; // Value disamakan dengan ID untuk sync
    });
  };

  // 2. Logika Sinkronisasi Dropdown
  document.getElementById('sel_id').addEventListener('change', (e) => {
    document.getElementById('sel_nama').value = e.target.value;
    renderHistory(e.target.value);
  });

  document.getElementById('sel_nama').addEventListener('change', (e) => {
    document.getElementById('sel_id').value = e.target.value;
    renderHistory(e.target.value);
  });

  // 3. Render Riwayat Berdasarkan User Terpilih
  function renderHistory(userId) {
    const box = document.getElementById('historyBox');
    const list = document.getElementById('listHistory');
    list.innerHTML = '';

    if (!userId) { box.style.display = 'none'; return; }
    
    // Filter history berdasarkan ID KARYAWAN (Key di JSON otomatis jadi ID_KARYAWAN)
    const userHistory = history.filter(h => h.ID_KARYAWAN === userId);
    box.style.display = 'block';

    userHistory.reverse().forEach(h => {
      // Normalisasi status untuk CSS class (Spasi jadi Underscore)
      const statusClass = h.STATUS_IZIN.replace(/\s+/g, '_');
      
      list.innerHTML += `
        <div class="history-card">
          <span class="status-badge ${statusClass}">${h.STATUS_IZIN}</span>
          <div style="font-weight:700; font-size:14px;">${h.TANGGAL_IZIN_MULAI} s/d ${h.TANGGAL_IZIN_AKHIR}</div>
          <div style="font-size:12px; color:#636e72; margin-top:5px;">${h.ALASAN}</div>
        </div>
      `;
    });
  }

  // 4. Submit Data
  document.getElementById('izinForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerText = 'Memproses...';

    const payload = {
      id: document.getElementById('sel_id').value,
      nama: document.getElementById('sel_nama').options[document.getElementById('sel_nama').selectedIndex].text,
      tgl_mulai: document.getElementById('tgl_mulai').value,
      tgl_akhir: document.getElementById('tgl_akhir').value,
      alasan: document.getElementById('alasan').value
    };

    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: JSON.stringify(payload)
    });

    alert('Pengajuan Berhasil Dikirim!');
    location.reload();
  });
</script>

</body>
</html>
