<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arasa Store - Form Izin</title>
  <style>
    :root { --primary: #317c56; --bg: #f8f9fa; --text: #2d3436; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; }
    .mobile-frame { background: white; width: 100%; max-width: 450px; min-height: 100vh; padding: 30px 20px; box-sizing: border-box; }
    
    .brand-area { text-align: center; margin-bottom: 30px; }
    .brand-logo { background: var(--primary); color: white; width: 60px; height: 60px; border-radius: 18px; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; font-weight: bold; font-size: 24px; }
    
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 12px; font-weight: 700; color: #636e72; text-transform: uppercase; margin-bottom: 8px; }
    select, input, textarea { width: 100%; padding: 14px; border: 1.5px solid #eee; border-radius: 12px; font-size: 14px; box-sizing: border-box; outline: none; background: #fafafa; }
    select:focus, input:focus { border-color: var(--primary); background: white; }
    
    .date-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    
    button { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 10px; transition: 0.3s; }
    button:disabled { background: #90bda3; cursor: not-allowed; }

    .history-card { padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 12px; position: relative; background: #fff; }
    .status-badge { position: absolute; top: 15px; right: 15px; font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
    
    .PENDING { background: #fff3cd; color: #856404; }
    .IZIN_DIBERIKAN { background: #d4edda; color: #155724; }
    .IZIN_TIDAK_DIBERIKAN { background: #f8d7da; color: #721c24; }
    
    .kategori-tag { display: inline-block; background: #f1f2f6; color: #57606f; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-top: 6px; }
  </style>
</head>
<body>

<div class="mobile-frame">
  <div class="brand-area">
    <div class="brand-logo">A</div>
    <h2 style="margin:0">HR Arasa Store</h2>
    <p style="color:#636e72; font-size: 14px;">Portal Perizinan Karyawan</p>
  </div>

  <form id="izinForm">
    <div class="form-group">
      <label>ID Karyawan</label>
      <select id="sel_id" required><option value="">Pilih ID</option></select>
    </div>

    <div class="form-group">
      <label>Nama Karyawan</label>
      <select id="sel_nama" required><option value="">Pilih Nama</option></select>
    </div>

    <div class="form-group">
      <label>Kategori Izin</label>
      <select id="kategori" required>
        <option value="">Pilih Kategori...</option>
        <option value="Sakit">Sakit</option>
        <option value="Cuti">Izin</option>
        <option value="Lainnya">Abnormal case</option>
      </select>
    </div>

    <div class="date-grid">
      <div class="form-group">
        <label>Tanggal Mulai</label>
        <input type="date" id="tgl_mulai" required>
      </div>
      <div class="form-group">
        <label>tanggal akhir</label>
        <input type="date" id="tgl_akhir" required>
      </div>
    </div>

    <div class="form-group">
      <label>Alasan Detail</label>
      <textarea id="alasan" rows="3" placeholder="menjadi power ranger merah dan menyelamatkan dunia, jadi ultraman melawan monster, mau jadi peyek aja dipojokan sampe ayem..." required></textarea>
    </div>

    <button type="submit" id="btnSubmit">Kirim Pengajuan</button>
  </form>

  <div id="historyBox" style="margin-top:40px;">
    <h3 style="font-size:16px; border-bottom: 2px solid #eee; padding-bottom: 10px;">Riwayat izine cah-cah</h3>
    <div id="listHistory" style="margin-top: 15px;">Sedang dimuat bolo...</div>
  </div>
</div>

<script>
  // ⚠️ GANTI DENGAN URL HASIL DEPLOYMENT BARU DARI TAHAP 2
  const API_URL = 'https://script.google.com/macros/s/AKfycbz0BupFs_75HESHJkKM4Uq_fYm9yTWUiWWpy6lIMQ79rodrZx6fGTQfGvM_kglZchaheQ/exec';
  
  let master = [];
  let historyData = [];

  window.onload = async () => {
    try {
      const res = await fetch(API_URL);
      const data = await res.json();
      master = data.master || [];
      historyData = data.history || [];

      const selId = document.getElementById('sel_id');
      const selNama = document.getElementById('sel_nama');

      master.forEach(k => {
        if(k.id_karyawan && k.nama_karyawan) {
          selId.innerHTML += `<option value="${k.id_karyawan}">${k.id_karyawan}</option>`;
          selNama.innerHTML += `<option value="${k.id_karyawan}">${k.nama_karyawan}</option>`;
        }
      });

      renderHistory();
    } catch (error) {
      console.error(error);
      document.getElementById('listHistory').innerHTML = '<p style="color:red; text-align:center; font-size:13px;">Gagal terhubung ke Database. Pastikan URL Deployment baru sudah dimasukkan.</p>';
    }
  };

  // Sinkronisasi ID dan Nama
  document.getElementById('sel_id').addEventListener('change', (e) => {
    document.getElementById('sel_nama').value = e.target.value;
  });

  document.getElementById('sel_nama').addEventListener('change', (e) => {
    document.getElementById('sel_id').value = e.target.value;
  });

  // Render History (Sekarang Menampilkan Kategori)
  function renderHistory() {
    const list = document.getElementById('listHistory');
    list.innerHTML = '';

    if (historyData.length === 0) {
      list.innerHTML = '<div style="text-align:center; color:#999; font-size:13px;">Belum ada riwayat izin yang diajukan.</div>';
      return;
    }
    
    historyData.reverse().forEach(h => {
      const statusValue = h.status ? h.status : 'PENDING';
      const statusClass = statusValue.replace(/\s+/g, '_');
      
      // Jika kategori kosong di data lama, berikan teks "-"
      const kategoriText = h.kategori ? h.kategori : '-';
      
      list.innerHTML += `
        <div class="history-card">
          <span class="status-badge ${statusClass}">${statusValue}</span>
          <div style="font-weight:700; font-size:14px; margin-bottom: 5px; padding-right: 90px;">
            ${h.nama || '-'} <span style="color:#a4b0be; font-size:12px;">(#${h.id_karyawan || '-'})</span>
          </div>
          <div style="font-size:12px; color:#636e72; font-weight: 500;">
            📅 ${h.tanggal_izin_mulai || '-'} s/d ${h.tanggal_izin_akhir || '-'}
          </div>
          <div class="kategori-tag">${kategoriText}</div>
        </div>
      `;
    });
  }

  // Mengirim Data
  document.getElementById('izinForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btnSubmit');
    btn.disabled = true;
    btn.innerText = 'Mengirim Data...';

    const selNamaElement = document.getElementById('sel_nama');
    const namaText = selNamaElement.options[selNamaElement.selectedIndex].text;

    // Menambahkan Kategori ke dalam pengiriman (Payload)
    const payload = {
      id_karyawan: document.getElementById('sel_id').value,
      nama: namaText,
      tanggal_izin_mulai: document.getElementById('tgl_mulai').value,
      tanggal_izin_akhir: document.getElementById('tgl_akhir').value,
      kategori: document.getElementById('kategori').value, // Menarik nilai kategori
      alasan: document.getElementById('alasan').value
    };

    try {
      await fetch(API_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      alert('Pengajuan Izin Berhasil Dikirim!');
      location.reload(); 
    } catch (error) {
      alert('Terjadi kesalahan saat mengirim data.');
      btn.disabled = false;
      btn.innerText = 'Kirim Pengajuan';
    }
  });
</script>

</body>
</html>
